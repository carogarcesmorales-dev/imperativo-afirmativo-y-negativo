<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperativo (Tú)</title>

    <!-- Tailwind FIXED (este sí funciona en GitHub) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8fafc;
            font-family: Arial, sans-serif;
        }

        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>

<body class="p-6 flex flex-col items-center">

    <h1 class="text-3xl font-bold mb-4">🎲 Imperativo (Tú)</h1>

    <div id="card" class="relative w-80 h-96 perspective-1000 cursor-pointer">
        
        <div id="inner" class="card-inner w-full h-full relative">

            <!-- FRONT -->
            <div class="card-front bg-white rounded-xl p-6 shadow-lg flex flex-col justify-between">
                <div class="text-5xl text-center" id="icon">🍽️</div>
                <h2 class="text-xl text-center font-bold" id="title">Restaurante</h2>

                <div>
                    <p><b>1.</b> <span id="v1">comer</span> despacio</p>
                    <p><b>2.</b> <span id="v2">hablar</span> con la boca llena</p>
                </div>

                <p class="text-center text-gray-400 text-sm">Haz clic para ver</p>
            </div>

            <!-- BACK -->
            <div class="card-back bg-indigo-600 text-white rounded-xl p-6 flex flex-col justify-center text-center">
                <p class="text-2xl font-bold" id="a1">¡Come!</p>
                <p id="fa1">¡Come despacio!</p>

                <hr class="my-4">

                <p class="text-2xl font-bold" id="a2">¡No hables!</p>
                <p id="fa2">¡No hables con la boca llena!</p>
            </div>

        </div>
    </div>

    <div class="mt-6 flex gap-4">
        <button onclick="prev()" class="px-4 py-2 bg-gray-200 rounded">Anterior</button>
        <button onclick="next()" class="px-4 py-2 bg-indigo-600 text-white rounded">Siguiente</button>
    </div>

    <p class="mt-4" id="counter"></p>

    <script>
        const data = [
            {icon:"🍽️", title:"Restaurante", v1:"comer", e1:"despacio", a1:"¡Come!", v2:"hablar", e2:"con la boca llena", a2:"¡No hables!"},
            {icon:"🤒", title:"Enfermo", v1:"descansar", e1:"", a1:"¡Descansa!", v2:"salir", e2:"de fiesta", a2:"¡No salgas!"},
            {icon:"📚", title:"Biblioteca", v1:"hablar", e1:"en voz baja", a1:"¡Habla!", v2:"hacer", e2:"ruido", a2:"¡No hagas!"},
            {icon:"🏋️", title:"Gimnasio", v1:"estirarse", e1:"", a1:"¡Estírate!", v2:"hacer", e2:"rápido", a2:"¡No hagas!"},
            {icon:"✈️", title:"Aeropuerto", v1:"llegar", e1:"temprano", a1:"¡Llega!", v2:"perder", e2:"el vuelo", a2:"¡No pierdas!"}
        ];

        let i = 0;
        const inner = document.getElementById("inner");

        function update() {
            let d = data[i];
            document.getElementById("icon").innerText = d.icon;
            document.getElementById("title").innerText = d.title;
            document.getElementById("v1").innerText = d.v1;
            document.getElementById("v2").innerText = d.v2;

            document.getElementById("a1").innerText = d.a1;
            document.getElementById("fa1").innerText = d.a1 + " " + d.e1;

            document.getElementById("a2").innerText = d.a2;
            document.getElementById("fa2").innerText = d.a2 + " " + d.e2;

            document.getElementById("counter").innerText = `Tarjeta ${i+1} de ${data.length}`;

            inner.classList.remove("is-flipped");
        }

        function next() {
            i = (i + 1) % data.length;
            update();
        }

        function prev() {
            i = (i - 1 + data.length) % data.length;
            update();
        }

        document.getElementById("card").addEventListener("click", () => {
            inner.classList.toggle("is-flipped");
        });

        update();
    </script>

</body>
</html>
